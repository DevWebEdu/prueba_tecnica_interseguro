server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # proxy the Go API so the frontend never needs a hardcoded public URL
    location /auth/ {
        proxy_pass         http://api-go:3000/auth/;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
    }

    location /api/ {
        proxy_pass         http://api-go:3000/api/;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
